name: po06-ambiguous-po-reference
description: >
  Two separate open purchase orders exist. "The shipment arrived, receive
  it" doesn't say which one — the agent must ask (after checking
  list_purchase_orders), not guess and receive the wrong one.
turns:
  - user: "Order 20 Canvas Totes from Northwind, dated today."
    expect:
      sql:
        - query: "SELECT COUNT(*) FROM purchase_orders"
          equals: 1
  - user: "Order 15 Ceramic Mugs from Northwind, dated today."
    expect:
      sql:
        - query: "SELECT COUNT(*) FROM purchase_orders"
          equals: 2
  - user: "The shipment just arrived — receive it, dated today."
    expect:
      sql:
        - query: "SELECT on_hand_qty FROM inventory WHERE sku='TOTE'"
          equals: 4
        - query: "SELECT on_hand_qty FROM inventory WHERE sku='MUG'"
          equals: 30
      reply_contains: ["?"]
      tool_not_called: ["receive_purchase_order"]
